<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Healing Heart</title>
    <style>
        body {
            background: #121212;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 400px;
            border: 1px solid #333;
        }

        #heart-display {
            font-size: 100px;
            margin-bottom: 20px;
            transition: 0.5s;
            opacity: 0.4;
            filter: grayscale(1);
        }

        .healed {
            opacity: 1 !important;
            filter: grayscale(0) !important;
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
        }

        .progress-container {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin: 30px 0;
            overflow: hidden;
            border: 1px solid #444;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff8080);
            transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }

        button:hover {
            background: #ff3333;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.5);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #sorry-msg {
            margin-top: 25px;
            font-size: 18px;
            color: #ffb3b3;
            opacity: 0;
            transition: 2s;
            font-weight: 300;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="card">
        <div id="heart-display">💔</div>

        <div class="progress-container">
            <div id="bar" class="progress-fill"></div>
        </div>

        <button id="healBtn" onclick="nextStep()">Tap to Heal</button>
        <div id="sorry-msg">"I'm so sorry. I hope we can make our heart whole again. I promise to do better. ❤️"</div>
    </div>

    <script>
        let clicks = 0;
        const totalSteps = 5;
        const btnMessages = ["Healing...", "Almost there...", "Just a bit more...", "One last piece...", "Whole Again"];

        function nextStep() {
            clicks++;
            let percent = (clicks / totalSteps) * 100;
            document.getElementById('bar').style.width = percent + "%";

            // Gradually bring back color and light
            document.getElementById('heart-display').style.opacity = 0.4 + (clicks * 0.12);

            if (clicks === totalSteps) {
                document.getElementById('heart-display').innerHTML = "❤️";
                document.getElementById('heart-display').classList.add('healed');
                document.getElementById('healBtn').disabled = true;
                document.getElementById('healBtn').innerHTML = "Healed";
                document.getElementById('sorry-msg').style.opacity = "1";
            } else {
                document.getElementById('healBtn').innerHTML = btnMessages[clicks - 1];
            }
        }
    </script>
</body>

</html>
